<header class="site-header">
  <div class="shell header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }} home">
      <span class="brand-mark" aria-hidden="true">BPC</span>
      <span class="brand-copy">
        <strong>{{ site.Title }}</strong>
        <small>{{ site.Params.tagline }}</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="Primary navigation">
      {{ range site.Menus.main }}
        {{- $active := or ($.IsMenuCurrent .Menu .) ($.HasMenuCurrent .Menu .) -}}
        <a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
